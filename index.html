<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMind AI V4 - Premium Studio</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#212121">
    <link rel="stylesheet" href="style.css?v=4.1">
    
    <!-- Premium Math Auto Render Libraries (KaTeX) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="dark-theme">

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ New chat</button>
            <button class="sidebar-toggle-btn close-btn" id="sidebarCloseBtn">✕</button>
        </div>
        <div class="sidebar-section-title">Recent Chats</div>
        <div class="chat-history-list" id="chatHistoryList"></div>
        <div class="sidebar-footer">
            <button id="userProfile" class="profile-footer-btn">
                <span class="user-avatar">👤</span>
                <span id="footerUserLabel" class="user-label-text">Sign In / Sign Up</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="sidebar-toggle-btn" id="sidebarOpenBtn">☰</button>
                <div class="logo">🤖 NovaMind AI</div>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button id="walkieTalkieToggle" class="theme-btn" title="Start Continuous Voice Mode">🎙️</button>
                <button id="voiceReplyToggle" class="theme-btn" title="Toggle AI Audio Synthesis">🔊</button>
                <button id="themeToggle" class="theme-btn">🌙</button>
            </div>
        </header>

        <div id="voiceStatusPanel" style="display: none; background: linear-gradient(135deg, #4f46e5, #6366f1); padding: 12px 20px; color: white; border-radius: 12px; margin: 10px 20px 0 20px; font-size: 14px; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="voiceStatusIndicator" class="pulse-dot">🔴</span>
                <span id="voiceStatusText">Walkie-Talkie Active...</span>
            </div>
            <button onclick="stopWalkieTalkieMode()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;">Stop</button>
        </div>

        <div class="mode-tabs">
            <button id="mode-chat" class="tab-btn active" onclick="switchGenerationMode('chat')">💬 Chat</button>
            <button id="mode-image" class="tab-btn" onclick="switchGenerationMode('image')">🎨 Image</button>
            <button id="mode-video" class="tab-btn" onclick="switchGenerationMode('video')">🎬 Video</button>
            <button id="mode-audio" class="tab-btn" onclick="switchGenerationMode('audio')">🎵 Audio</button>
        </div>

        <select id="aspectRatio" class="ratio-select" style="display: none;">
            <option value="1:1">1:1 (Square)</option>
            <option value="16:9" selected>16:9 (Landscape)</option>
            <option value="9:16">9:16 (Shorts)</option>
        </select>

        <div id="chat" class="chat">
            <div class="message ai" id="msg-welcome-init">
                <div class="msg-text">Workspace Active. Math renderer formulas and structural layout guards are deployed. 👍</div>
            </div>
        </div>

        <input type="file" id="masterFileInput" hidden>

        <div id="previewContainer" class="preview-container" style="display: none;">
            <span id="previewName"></span>
            <button id="cancelPreview">❌</button>
        </div>

        <div id="attachMenu" class="attach-menu">
            <button onclick="triggerFileSelect('image')">📷 Image Input</button>
            <button onclick="triggerFileSelect('video')">📹 Video Clip</button>
            <button onclick="triggerFileSelect('pdf')">📄 PDF Matrix</button>
            <button onclick="triggerFileSelect('docx')">📁 Word File</button>
            <button onclick="triggerFileSelect('txt')">📝 Text Logs</button>
        </div>

        <div class="bottom">
            <button id="attach" class="circle-btn">➕</button>
            <input type="text" id="message" placeholder="Ask NovaMind AI..." autocomplete="off">
            <button id="send" class="circle-btn">➤</button>
        </div>
    </main>
</div>

<div id="authOverlay" class="auth-page-overlay" style="display:none;">
    <div class="auth-card">
        <h2 id="authTitle">Welcome back</h2>
        <input type="text" id="authName" placeholder="Full Name" style="display: none; width:100%; padding:10px; margin:5px 0;">
        <input type="email" id="authUsername" placeholder="Email address" style="width:100%; padding:10px; margin:5px 0;">
        <input type="password" id="authPassword" placeholder="Password" style="width:100%; padding:10px; margin:5px 0;">
        <button id="authSubmitBtn" class="auth-btn primary-submit-btn">Continue</button>
        <button id="authCloseBtn" class="auth-btn cancel-btn">Cancel</button>
    </div>
</div>

<script src="script.js?v=4.1"></script>
<script>
    let activeGenerationMode = "chat";
    function triggerFileSelect(type) {
        const input = document.getElementById('masterFileInput');
        if(type === 'image') input.accept = "image/*";
        else if(type === 'video') input.accept = "video/*";
        else if(type === 'pdf') input.accept = ".pdf";
        else if(type === 'docx') input.accept = ".doc,.docx";
        else input.accept = ".txt,.js,.py,.html,.css,.json";
        
        input.setAttribute('data-target-type', type);
        input.click();
        document.getElementById('attachMenu').classList.remove('active');
    }
    function switchGenerationMode(targetMode) {
        activeGenerationMode = targetMode;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`mode-${targetMode}`).classList.add('active');
        const mainInput = document.getElementById("message");
        const ratioSelect = document.getElementById("aspectRatio");

        if(targetMode === "chat") {
            mainInput.placeholder = "Ask NovaMind Anything...";
            ratioSelect.style.display = "none";
        } else {
            mainInput.placeholder = `Describe prompt to generate ${targetMode}...`;
            ratioSelect.style.display = (targetMode === "image" || targetMode === "video") ? "block" : "none";
        }
    }

    if ('serviceWorker' in navigator) {
        window.navigator.serviceWorker.getRegistrations().then(registrations => {
            for(let registration of registrations) { registration.unregister(); }
        });
    }
</script>
</body>
</html>
