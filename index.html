<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMind AI V3</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .bottom { display: flex !important; align-items: center !important; gap: 10px !important; padding: 15px !important; }
        .bottom input { flex: 1 !important; min-width: 0 !important; }
        .circle-btn { flex-shrink: 0 !important; display: flex !important; align-items: center !important; justify-content: center !important; }
        .tts-btn { background: none; border: none; cursor: pointer; font-size: 14px; opacity: 0.6; color: inherit; transition: opacity 0.2s; }
        .tts-btn:hover { opacity: 1; }
        .msg-actions { display: flex; gap: 8px; margin-top: 5px; }
    </style>
</head>
<body class="dark-theme">

<div class="app">
    <header class="header">
        <div class="logo">🤖 NovaMind AI</div>
        <div style="display: flex; gap: 10px;">
            <button id="voiceReplyToggle" class="theme-btn" title="Toggle AI Voice Reply">🔊</button>
            <button id="themeToggle" class="theme-btn">🌙</button>
        </div>
    </header>

    <div id="chat" class="chat">
        <div class="message ai">
            <div class="msg-text">Hello Ayush 👋<br><br>How can I help you today?</div>
        </div>
    </div>

    <input type="file" id="image" accept="image/*" hidden>
    <input type="file" id="pdf" accept=".pdf" hidden>
    <input type="file" id="docx" accept=".doc,.docx" hidden>
    <input type="file" id="txt" accept=".txt" hidden>

    <div id="previewContainer" class="preview-container" style="display: none;">
        <span id="previewName"></span>
        <button id="cancelPreview">❌</button>
    </div>

    <div id="attachMenu" class="attach-menu">
        <button onclick="uploadClick('image')">📷 Image</button>
        <button onclick="uploadClick('pdf')">📄 PDF</button>
        <button onclick="uploadClick('docx')">📁 DOCX</button>
        <button onclick="uploadClick('txt')">📝 TXT</button>
    </div>

    <div class="bottom">
        <button id="attach" class="circle-btn">➕</button>
        <input type="text" id="message" placeholder="Ask NovaMind AI..." autocomplete="off">
        <button id="mic" class="circle-btn">🎤</button>
        <button id="send" class="circle-btn">➤</button>
    </div>

    <button id="clear" hidden>Clear</button>
</div>

<script src="script.js"></script>
<script>
    function uploadClick(id) {
        document.getElementById(id).click();
        document.getElementById('attachMenu').classList.remove('active');
    }
</script>
</body>
</html>
